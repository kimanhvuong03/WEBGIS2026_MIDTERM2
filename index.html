<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>WebGIS Hanoi - Vương Thị Kim Anh</title>
        
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
        <style>
            html, body, #map { width: 100%; height: 100%; padding: 0; margin: 0; }
            
            /* Tiêu đề theo đúng yêu cầu của thầy */
            #header-title {
                position: absolute;
                top: 15px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 1000;
                background: white;
                padding: 10px 25px;
                border: 2px solid black;
                text-align: center;
                font-family: "Times New Roman", Times, serif;
                box-shadow: 0 4px 10px rgba(0,0,0,0.3);
                min-width: 500px;
            }
            
            /* Style cho nhãn tên huyện */
            .district-label {
                background: transparent;
                border: none;
                box-shadow: none;
                font-weight: bold;
                color: black;
                font-size: 11px;
                text-shadow: 1px 1px 2px white;
            }

            /* Chú giải (Legend) góc trên bên phải */
            .info.legend {
                background: white;
                padding: 10px;
                border: 1px solid black;
                line-height: 18px;
            }
            .info.legend i {
                width: 18px;
                height: 18px;
                float: left;
                margin-right: 8px;
                opacity: 0.8;
            }
        </style>
    </head>
    <body>
        <div id="header-title">
            <b style="font-size: 16px; text-transform: uppercase;">MAP OF PRESCHOOL TEACHER DISTRIBUTION IN HANOI (Publicly available) 2023-2024</b><br>
            <span style="font-size: 14px;">2106080018 - Vương Thị Kim Anh</span>
        </div>

        <div id="map"></div>

        <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
        
        <script src="layers/gadm41_VNM_2virtual_4.js"></script>

        <script>
        var map = L.map('map', {
            zoomControl:true, maxZoom:28, minZoom:1
        }).setView([21.0285, 105.8542], 10);

        // Lớp nền OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'OpenStreetMap'
        }).addTo(map);

        // Màu sắc phân cấp (Graduated) dựa trên số lượng giáo viên
        function getColor(d) {
            return d > 1287 ? '#800026' :
                   d > 1034 ? '#BD0026' :
                   d > 755  ? '#E31A1C' :
                   d > 570  ? '#FC4E2A' :
                              '#FFEDA0';
        }

        function styleHanoi(feature) {
            return {
                fillColor: getColor(feature.properties.GiaoVien_Num), // Tên cột dữ liệu
                weight: 1.5,
                opacity: 1,
                color: 'white',
                fillOpacity: 0.7
            };
        }

        function onEachFeature(feature, layer) {
            // Hiện tên huyện luôn trên bản đồ
            if (feature.properties && feature.properties.NAME_2) {
                layer.bindTooltip(feature.properties.NAME_2, {
                    permanent: true, 
                    direction: 'center', 
                    className: 'district-label'
                });
            }
            layer.bindPopup("District: " + feature.properties.NAME_2 + "<br>Teachers: " + feature.properties.GiaoVien_Num);
        }

        // Nạp dữ liệu với biến json_hanoi_data đã tạo ở Bước 1
        var layer_Hanoi = L.geoJson(json_hanoi_data, {
            style: styleHanoi,
            onEachFeature: onEachFeature
        }).addTo(map);

        // Tự động căn chỉnh màn hình vào vùng Hà Nội
        if (layer_Hanoi) { map.fitBounds(layer_Hanoi.getBounds()); }

        // Tạo Chú giải (Legend)
        var legend = L.control({position: 'topright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'info legend');
            var grades = [369, 570, 755, 1034, 1287];
            div.innerHTML = '<strong>Teacher Count</strong><br>';
            for (var i = 0; i < grades.length; i++) {
                div.innerHTML +=
                    '<i style="background:' + getColor(grades[i] + 1) + '"></i> ' +
                    grades[i] + (grades[i + 1] ? '&ndash;' + grades[i + 1] + '<br>' : '+');
            }
            return div;
        };
        legend.addTo(map);
        </script>
    </body>
</html>
